stack:
  decoder_dim: 768
  num_decoder_tokens: 1
  num_heads: 32
  num_layers: 4
  ffn_enabled: true
  ffn_mlp_ratio: 4.0
  ffn_dropout: 0.2
  self_attn_queries: true
  self_attn_student: false
  gating_enabled: true
  gating_mode: flamingo
  cross_attn_residual: true
  student_projection_mode: res_mlp
  student_projection_mlp_ratio: 4.0
  student_projection_dropout: 0.05
  positional_encodings: false