stack:
  decoder_dim: 128
  num_decoder_tokens: 1024
  num_heads: 32
  num_layers: 1
  ffn_enabled: true
  ffn_mlp_ratio: 4.0
  ffn_dropout: 0.1
  self_attn_queries: true
  self_attn_student: false
  gating_enabled: false
  gating_mode: none
  cross_attn_residual: true
  student_projection_mode: res_mlp
  student_projection_mlp_ratio: 4.0
  student_projection_dropout: 0.01
  positional_encodings: false
